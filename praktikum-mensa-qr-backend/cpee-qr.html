<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Mensa Menu · QR Control</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="cpee-qr.css" rel="stylesheet">

  <!-- jQuery（lehre 上自带） -->
  <script src="/js_libs/jquery.min.js"></script>
  <!-- qrcode.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

</head>
<body>
<div class="root-shell">
  <div class="top-bar">
    <div>
      <div class="top-title" id="top-title">Mensa Display</div>
      <div class="top-subtitle" id="top-subtitle">
        Scan the QR code on your phone to control the display.
      </div>
    </div>
    <div class="label-chip" id="top-chip">Idle</div>
  </div>

  <!-- 主内容：根据 view 切换不同 stage -->
  <div id="stage-container" class="center-stage">
    <!-- JS 会在这里插入内容 -->
  </div>

  <div id="msg"></div>
</div>

<script>
  // ===== 工具函数：URL 参数、错误提示、价格格式化（逐行注释） =====
  function getParams() { // 读取并解析 URL 查询参数
    const usp = new URLSearchParams(window.location.search); // 从当前地址栏读取 ? 后面的查询串
    const obj = {}; // 准备一个普通对象来保存参数键值对
    for (const [k, v] of usp.entries()) obj[k] = v; // 逐个遍历参数，把 key/value 写入对象
    return obj; // 返回解析好的参数对象
  }

  function showError(msg) { // 在页面上显示错误信息
    $("#msg").text(msg).show(); // 把错误文本写入 #msg 并显示出来
  }

  function makeSendUrl(commandObj, cb) { // 生成发送到 CPEE 的控制 URL
    const info = encodeURIComponent(JSON.stringify(commandObj)); // 把命令对象转成 JSON 再做 URL 编码
    const cbEnc = encodeURIComponent(cb); // 把回调地址编码成可安全拼接的字符串
    return "https://lehre.bpm.in.tum.de/~ge93fuw/qr/send.php" // CPEE 的中转接口地址
           + "?info=" + info // 把 info 参数拼到 URL 上
           + "&cb="   + cbEnc; // 把 cb 参数拼到 URL 上
  }

  function buildQrChip($container, title, cmdObj, cb) { // 创建二维码卡片并插入到容器
    const chip = $('<div class="qr-chip"></div>'); // 创建二维码外壳容器
    const inner = $('<div class="qr-inner"></div>'); // 创建用于放二维码画布的内层容器
    const qrDiv = $('<div></div>'); // 真实渲染二维码的空 div
    inner.append(qrDiv); // 把二维码 div 放进内层容器
    chip.append(inner); // 把内层容器放进卡片
    chip.append($('<div class="qr-caption"></div>').text(title)); // 添加二维码标题文字
    $container.append(chip); // 把整个二维码卡片加入目标容器

    const url = makeSendUrl(cmdObj, cb); // 根据命令对象和回调生成二维码内容
    new QRCode(qrDiv[0], { // 使用 qrcode.js 在指定 div 中生成二维码
      text: url, // 二维码承载的文本内容（URL）
      width: 120, // 二维码宽度
      height: 120, // 二维码高度
      colorDark : "#000000", // 深色像素颜色
      colorLight : "#ffffff", // 浅色背景颜色
      correctLevel : QRCode.CorrectLevel.L // 纠错等级（低）
    });
  }

  // 统一食堂名称显示
  function getNiceCanteenName(id) { // 把内部 id 转成可读名称
    switch (id) { // 根据不同 id 返回不同显示名
      case "garching": return "Mensa Garching"; // Garching 食堂
      case "arcis":    return "Mensa Arcisstraße"; // Arcisstraße 食堂
      case "loth":     return "Mensa Lothstraße"; // Lothstraße 食堂
      case "leopold":  return "Mensa Leopold"; // Olympiapark 食堂
      case "Boltzmann": return "StuBistro Boltzmann"; // Boltzmann 小食堂
      default:         return id || "Mensa"; // 兜底：有 id 用 id，否则用 Mensa
    }
  }

  // 基础食堂信息（地址）
  function getCanteenInfo(id) { // 根据 id 返回食堂基础信息
    const map = { // 食堂信息映射表
      garching: { // Garching 配置
        name: "Mensa Garching", // 显示名称
        address: "", // 地址（当前为空）
      },
      arcis: { // Arcis 配置
        name: "Mensa Arcisstraße", // 显示名称
        address: "", // 地址（当前为空）
      },
      loth: { // Loth 配置
        name: "Mensa Lothstraße", // 显示名称
        address: "", // 地址（当前为空）
      },
      leopold: { // Leopold 配置
        name: "Mensa Leopold", // 显示名称
        address: "", // 地址（当前为空）
      },
      Boltzmann: { // Boltzmann 配置
        name: "StuBistro Boltzmann", // 显示名称
        address: "", // 地址（当前为空）
      }
    }; // 映射表结束
    return map[id] || { name: getNiceCanteenName(id), address: "", hero: "" }; // 找不到就用兜底名称
  }

  // 标签转 emoji，便于快速识别素/鱼等
  function labelToEmoji(label) { // 把标签文本映射为 emoji
    const l = (label || "").toLowerCase(); // 规范化为小写字符串
    if (l.includes("vegan")) return "🌱"; // 素食
    if (l.includes("vegetarian") || l.includes("veg")) return "🥕"; // 素菜
    if (l.includes("fish")) return "🐟"; // 鱼类
    if (l.includes("bio")) return "🌾"; // 有机
    if (l.includes("lactose")) return "🥛"; // 乳糖
    if (l.includes("gluten")) return "🌾"; // 麦麸
    return ""; // 没匹配就返回空
  }

  // 将价格对象格式化为字符串
  function formatPrice(p) { // 把价格对象格式化成字符串
    if (!p) return ""; // 没有价格对象就返回空
    const unit = p.unit || "100g"; // 单位，默认 100g
    const base = Number(p.base_price || 0); // 基础价格
    const per = Number(p.price_per_unit || 0); // 每单位价格
    if (base > 0 && per > 0) return `${base.toFixed(2)} € + ${per.toFixed(2)} € / ${unit}`; // 同时有基础价和单位价
    if (per > 0) return `${per.toFixed(2)} € / ${unit}`; // 只有单位价
    if (base > 0) return `${base.toFixed(2)} €`; // 只有基础价
    return p.text || ""; // 兜底用文本
  }

  // 支持多种价格结构（数组或对象 students/staff/guests）
  function normalizePrices(item) { // 把价格结构统一成数组
    if (!item) return []; // 没有菜品就返回空数组
    const p = item.prices; // 提取价格字段
    const normalized = []; // 统一后的价格数组

    if (Array.isArray(p) && p.length) { // 如果 prices 是数组
      p.forEach(entry => { // 遍历每个价格条目
        normalized.push({ // 推入统一结构
          label: entry.label || "Price", // 价格标签（默认 Price）
          text: entry.text || formatPrice(entry) // 价格文本（优先 text）
        });
      });
      return normalized; // 数组形式处理完直接返回
    }

    if (p && typeof p === "object") { // 如果 prices 是对象
      const order = [ // 价格显示顺序
        { key: "students", label: "Students" }, // 学生
        { key: "staff", label: "Staff" }, // 员工
        { key: "employees", label: "Staff" }, // 员工（别名）
        { key: "guests", label: "Guests" }, // 访客
        { key: "guest", label: "Guests" } // 访客（别名）
      ];
      order.forEach(({ key, label }) => { // 按顺序检查每个价格类型
        if (p[key] !== undefined && p[key] !== null) { // 允许价格为 0，也允许空对象但不跳过
          normalized.push({ label, text: formatPrice(p[key]) }); // 统一后加入数组
        }
      });
    }
    return normalized; // 返回统一后的价格数组
  }

  // 生成菜单卡片栅格
  function renderDishCards(menuData) { // 根据菜单数据生成菜品卡片
    const $grid = $('<div class="menu-grid"></div>'); // 创建网格容器

    if (!menuData || !menuData.items || menuData.items.length === 0) { // 没有菜单或菜单为空
      $grid.append('<div style="grid-column: 1/-1; text-align:center; padding:28px; color: var(--text-muted);">No menu available (maybe weekend or holiday).</div>'); // 插入空状态提示
      return $grid; // 直接返回空状态容器
    }

    menuData.items.forEach(item => { // 遍历每个菜品
      const card = $('<div class="dish-card"></div>'); // 创建菜品卡片
      const header = $('<div class="dish-header"></div>'); // 创建卡片头部
      header.append($('<div class="dish-name"></div>').text(item.name || "")); // 菜名
      if (item.type) { // 如果有类型
        header.append($('<div class="dish-type"></div>').text(item.type)); // 添加类型标签
      }
      card.append(header); // 把头部放进卡片

      if (item.labels && item.labels.length) { // 如果有标签
        const labelsDiv = $('<div class="dish-labels"></div>'); // 标签容器
        item.labels.forEach(l => { // 遍历标签
          const emoji = labelToEmoji(l); // 获取对应 emoji
          const pill = $('<span class="dish-label-pill"></span>'); // 创建标签胶囊
          if (emoji) pill.append($('<span></span>').text(emoji)); // 如果有 emoji 就加上
          pill.append($('<span></span>').text(l)); // 添加标签文本
          labelsDiv.append(pill); // 把标签加入容器
        });
        card.append(labelsDiv); // 把标签容器放进卡片
      }

      const priceList = $('<div class="price-list"></div>'); // 价格列表容器
      const prices = normalizePrices(item); // 统一价格结构
      if (!prices.length) { // 没有价格
        priceList.append('<div class="price-pill"><span class="price-value">No price info</span></div>'); // 显示无价格信息
      } else {
        prices.forEach(p => { // 遍历每条价格
          const pill = $('<div class="price-pill"></div>'); // 价格胶囊
          pill.append($('<span class="price-label"></span>').text((p.label || 'Price') + ':')); // 价格标签
          pill.append($('<span class="price-value"></span>').text(p.text || '—')); // 价格数值
          priceList.append(pill); // 加入价格列表
        });
      }
      card.append(priceList); // 把价格列表放进卡片

      $grid.append(card); // 把卡片加入网格
    });

    return $grid; // 返回完整的菜单网格
  }

  // ===== 入口：根据 view 渲染不同阶段 =====
  $(function() { // DOM 就绪后执行
    const params = getParams(); // 读取 URL 参数
    const rawView = (params.view || "intro").toString(); // 获取 view 参数
    let view = "intro"; // 默认视图
    if (rawView.indexOf("list") !== -1) { // 如果 view 包含 list
      view = "list"; // 切换到列表视图
    } else if (rawView.indexOf("menu") !== -1) { // 如果 view 包含 menu
      view = "menu"; // 切换到菜单视图
    } else if (rawView.indexOf("intro") !== -1) { // 如果 view 包含 intro
      view = "intro"; // 切换到介绍视图
    } else {
      view = rawView.split("?")[0].split("&")[0] || "intro"; // 兜底取第一个片段
    }

    const canteen = (params.canteen || "").toString(); // 获取 canteen 参数
    const cb = (window.name || params.cb || "").toString(); // 获取回调地址（window.name 优先）

    const $stage = $("#stage-container"); // 主内容容器
    const $topTitle = $("#top-title"); // 顶部标题
    const $topSubtitle = $("#top-subtitle"); // 顶部副标题
    const $topChip = $("#top-chip"); // 顶部状态标签
    $stage.empty(); // 清空主内容
    $("#msg").hide(); // 隐藏错误提示

    if (!cb) { // 没有回调地址
      showError("No callback received from CPEE. For testing, set it manually via ?cb=<url>."); // 显示错误
    }

    /* ===== intro 视图 ===== */
    if (view === "intro") { // 进入 intro 视图
      $stage.removeClass("menu-stage list-stage").addClass("center-stage"); // 设置容器布局样式
      $topTitle.text("Mensa Display Control"); // 设置标题
      $topSubtitle.text("Main menu: scan a QR code to open the canteen list on your phone."); // 设置副标题
      $topChip.text("Stage · Intro"); // 设置状态标签

      const $card = $('<div class="stage-card"></div>'); // 创建中心卡片
      $card.append('<div class="stage-label">WELCOME</div>'); // 添加卡片标签
      $card.append('<div class="stage-heading">Welcome to Mensa Self-Service Navigation</div>'); // 添加卡片标题
      $card.append('<div class="stage-desc">Scan a QR code below, choose a canteen on your phone, and control the display.</div>'); // 添加卡片描述

      const $qrs = $('<div class="stage-qrs"></div>'); // 二维码容器
      if (cb) { // 有回调地址时才生成二维码
        buildQrChip($qrs, // 创建二维码
          "View all canteens", // 二维码标题
          { state: "list", action: "show-list", canteen: "" }, // 发送给 CPEE 的命令
          cb // 回调地址
        );
      }
      $card.append($qrs); // 把二维码容器放进卡片
      $stage.append($card); // 把卡片放入主容器

    /* ===== list 视图 ===== */
    } else if (view === "list") { // 进入 list 视图
      $stage.removeClass("menu-stage").addClass("center-stage list-stage"); // 设置容器布局样式
      $topTitle.text("Select a Mensa"); // 设置标题
      $topSubtitle.text("Canteen list: choose a canteen or return to the main menu."); // 设置副标题
      $topChip.text("Stage · List"); // 设置状态标签

      const $card = $('<div class="stage-card"></div>'); // 创建中心卡片
      $card.append('<div class="stage-label">CANTEENS</div>'); // 添加卡片标签
      $card.append('<div class="stage-heading">Select a Mensa to view the menu</div>'); // 添加卡片标题
      $card.append("<div class=\"stage-desc\">After scanning, your phone opens the control page and shows that canteen's menu on the display.</div>"); // 添加卡片描述

      const $qrs = $('<div class="stage-qrs"></div>'); // 二维码容器
      if (cb) { // 有回调地址才生成二维码
        buildQrChip($qrs, // 返回主菜单
          "Back to main menu",
          { state: "intro", action: "back-main", canteen: "" },
          cb
        );
        buildQrChip($qrs, // Garching
          "Mensa Garching",
          { state: "menu", action: "show-menu", canteen: "garching" },
          cb
        );
        buildQrChip($qrs, // Arcisstraße
          "Mensa Arcisstraße",
          { state: "menu", action: "show-menu", canteen: "arcis" },
          cb
        );
        buildQrChip($qrs, // Lothstraße
          "Mensa Lothstraße",
          { state: "menu", action: "show-menu", canteen: "loth" },
          cb
        );
         buildQrChip($qrs, // Leopold
          "Mensa Leopold",
          { state: "menu", action: "show-menu", canteen: "leopold" },
          cb
        );
        buildQrChip($qrs, // Boltzmann
          "StuBistro Boltzmann",
          { state: "menu", action: "show-menu", canteen: "Boltzmann" },
          cb
        );
        buildQrChip($qrs, // 退出大屏
          "Exit display",
          { state: "abort", action: "exit", canteen: "" },
          cb
        );
      }
      $card.append($qrs); // 把二维码容器放进卡片
      $stage.append($card); // 把卡片放入主容器

    /* ===== menu 视图（整页菜单 + 顶部两个 QR） ===== */
    } else if (view === "menu") { // 进入 menu 视图
      $stage.removeClass("center-stage list-stage").addClass("menu-stage"); // 切换容器布局为菜单布局
      const info = getCanteenInfo(canteen); // 获取食堂信息
      const niceName = info.name || getNiceCanteenName(canteen); // 取显示名称
      $topTitle.text(niceName || "Mensa Menu"); // 设置标题
      $topSubtitle.text("Use your phone to control the display · QR codes return to list or main menu"); // 设置副标题
      $topChip.text("Stage · Menu"); // 设置状态标签

      document.body.style.backgroundImage = // 设置背景图（保持一致）
        `linear-gradient(145deg, rgba(5, 9, 18, 0.92), rgba(9, 16, 32, 0.88))`;

      const $menuStage = $('<div class="menu-stage"></div>'); // 创建菜单主容器
      const $hero = $('<div class="menu-hero"></div>'); // 创建菜单头部卡片
      const $heroContent = $('<div class="menu-hero-content"></div>'); // 头部文字容器
      const $heroQrs = $('<div class="menu-hero-qrs"></div>'); // 头部二维码容器
      $heroContent.append($('<div class="menu-heading-main"></div>').text((niceName || "Mensa") + " Menu")); // 头部主标题
      $heroContent.append($('<div class="menu-heading-sub" id="menu-date-label">Menu loading…</div>')); // 日期占位
      $heroContent.append($('<div class="menu-heading-sub" id="menu-address"></div>').text("")); // 地址占位
      $hero.append($heroContent); // 把文字容器放进头部卡片
      $hero.append($heroQrs); // 把二维码容器放进头部卡片
      $menuStage.append($hero); // 把头部卡片放入主容器

      const $bottom = $('<div class="bottom-qrs"></div>'); // 菜单页二维码条（放在头部）
      if (cb) { // 有回调地址才显示
        buildQrChip($bottom, // 返回列表二维码
          "Back to canteen list",
          { state: "list", action: "back-list", canteen: canteen },
          cb
        );
        buildQrChip($bottom, // 返回主菜单二维码
          "Back to main menu",
          { state: "intro", action: "back-main", canteen: "" },
          cb
        );
      }
      $heroQrs.append($bottom); // 把二维码条放入头部二维码容器

      const $scroll = $('<div class="menu-scroll"></div>'); // 创建可滚动区域
      const $gridWrapper = $('<div></div>'); // 创建包裹容器
      $gridWrapper.append('<div class="menu-grid" id="menu-grid"></div>'); // 创建菜单网格占位
      $scroll.append($gridWrapper); // 把网格放入滚动区域
      $menuStage.append($scroll); // 把滚动区域放入主容器

      $stage.html($menuStage); // 用菜单主容器替换页面内容

      const renderWithData = (data) => { // 渲染菜单数据
        if (data.error) { // 如果接口返回错误
          $("#menu-grid").empty(); // 清空菜单
          $("#menu-grid").append('<div style="grid-column:1/-1;padding:16px;color:var(--text-muted);">No menu available (maybe weekend or holiday).</div>'); // 显示错误状态
        } else {
          $("#menu-date-label").text("Menu for " + data.date); // 更新日期标题
          $("#menu-address").text(data.address || ""); // 更新地址文本
          const $cards = renderDishCards(data); // 生成菜单卡片
          $("#menu-grid").replaceWith($cards); // 替换原有网格
          $cards.attr("id","menu-grid"); // 恢复 id 便于后续操作
        }
      };

      if (canteen) { // 如果有食堂参数
        const apiUrl = // 构造菜单接口地址
          "https://lehre.bpm.in.tum.de/ports/9002/api/menu?canteen=" +
          encodeURIComponent(canteen);

        fetch(apiUrl) // 发起请求
          .then(r => r.json()) // 解析 JSON
          .then(renderWithData) // 渲染数据
          .catch(err => { // 请求失败
            console.error("menu fetch failed:", err); // 输出错误日志
          });
      } else {
        $("#menu-date-label").text("No canteen specified."); // 没有食堂参数
        $("#menu-address").text(""); // 清空地址
        $("#menu-grid").append('<div style="grid-column:1/-1;padding:16px;color:var(--text-muted);">No canteen specified.</div>'); // 显示提示
      }

      // 简单自动上下缓慢滚动（可关掉这段 if 不想要）
      (function autoScroll(){ // 自执行函数开启滚动
        const el = document.querySelector('.menu-scroll'); // 获取滚动容器
        if (!el) return; // 如果不存在就退出
        let dir = 1; // 滚动方向（1 向下，-1 向上）
        setInterval(() => { // 每隔一段时间滚动
          if (el.scrollHeight <= el.clientHeight + 4) return; // 内容不需要滚动就跳过
          el.scrollTop += dir * 1; // 按方向移动 1 像素
          if (el.scrollTop + el.clientHeight >= el.scrollHeight - 4) dir = -1; // 到底部就反向
          if (el.scrollTop <= 0) dir = 1; // 到顶部就正向
        }, 70); // 70ms 刷新一次
      })();

    } else {
      showError("Unknown view parameter view='" + view + "', raw='" + rawView + "'."); // 未知视图参数
    }
  });
</script>
</body>
</html>
